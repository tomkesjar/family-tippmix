spring.application.name=tippmix

# Postgre SQL settings
#spring.datasource.url=jdbc:postgresql://localhost:5432/TIPPMIX
#spring.datasource.username=postgres
#spring.datasource.password=kesjar
spring.datasource.driver-class-name=org.postgresql.Driver

# Primary: DATABASE_URL (Railway provides this as postgresql://user:pass@host:port/db).
# Fallback: construct the URL from individual PGHOST / PGPORT / PGDATABASE env vars.
# Local-dev defaults kick in when none of the env vars are set at all.
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:tippmix}}


spring.datasource.username=${Postgres.PGUSER:${PGUSER:postgres}}
spring.datasource.password=${Postgres.PGPASSWORD:${PGPASSWORD:kesjar}}



# JPA / Hibernate settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# to enable JPA can automatically create or update your schema: check entities, compare them with existing tables; create or update tables / columns accordingly
# great for local dev, but don't use it in PROD
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

# TODO KT memory modification
# ── Memory optimisations ──────────────────────────────────────────────────────
# Initialise beans only when first needed → smaller heap at startup
spring.main.lazy-initialization=true
# Keep the connection pool small — this app has low concurrency
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# Railway injects PORT; fall back to 8080 for local / Docker runs
server.port=${PORT:8080}

# Trust Railway's reverse-proxy headers so Spring Boot knows its real external URL
# (scheme=https, host=xxx.railway.app, port=443).  Without this, CorsFilter compares
# Origin: https://xxx.railway.app  against  server: localhost:8080  → false cross-origin → 403.
server.forward-headers-strategy=native

